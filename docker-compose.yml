services:
  db:
    image: postgres:16
    container_name: whats-aiassist-db
    environment:
      POSTGRES_DB: userdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userdb"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    container_name: whats-aiassist-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/userdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      APP_SECURITY_READER_USERNAME: reader
      APP_SECURITY_READER_PASSWORD: reader123
      APP_SECURITY_WRITER_USERNAME: admin
      APP_SECURITY_WRITER_PASSWORD: admin123
    ports:
      - "8080:8080"

volumes:
  postgres-data:
